<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CAM Engine Demo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23f3f4f6'/%3E%3Cpath d='M14 42L24 22l8 14 8-20 10 26' fill='none' stroke='%231f2937' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="demo.css">
</head>
<body>
<div id="app">
  <header>
    <h1>CAM Engine</h1>
    <p>Toolpath demo with 3D preview.</p>
  </header>
  <div id="layout">
    <nav id="sidebar">
      <section id="sourceSection">
        <h2 id="sourceTitle">Source</h2>
        <div id="vectorSource" class="source-group">
          <div class="form-group">
            <select id="shapeSelect">
              <option value="square">Square 50mm</option>
              <option value="circle">Circle 50mm</option>
              <option value="star">Star 50mm</option>
              <option value="rectangle">Rectangle 80x40mm</option>
              <option value="ring">Ring</option>
              <option value="cross">Cross</option>
              <option value="camengineText">CAMEngine Text</option>
            </select>
          </div>
          <button id="loadSvgBtn" class="btn-small" style="width:100%;margin-top:6px">Open SVG Paths…</button>
          <input type="file" id="svgFileInput" accept=".svg" style="display:none">
        </div>
        <div id="bitmapSource" class="source-group" style="display:none">
          <button id="loadImgBtn" class="btn-small" style="width:100%">Open Image…</button>
          <input type="file" id="imgFileInput" accept="image/*" style="display:none">
        </div>
        <div id="meshSource" class="source-group" style="display:none">
          <button id="loadStlBtn" class="btn-small" style="width:100%">Open STL…</button>
          <input type="file" id="stlFileInput" accept=".stl" style="display:none">
          <button id="resizeMeshBtn" class="btn-small" style="width:100%;margin-top:6px">Resize Mesh…</button>
        </div>
      </section>
      <section>
        <div class="cat-tabs">
          <button class="cat-tab active" data-cat="vector">Vector</button>
          <button class="cat-tab" data-cat="laser">Laser</button>
          <button class="cat-tab" data-cat="dragKnife">Drag</button>
          <button class="cat-tab" data-cat="bitmap">Bitmap</button>
          <button class="cat-tab" data-cat="mesh">3D</button>
        </div>
        <h2>Operation</h2>
        <div class="form-group">
          <select id="operationSelect"></select>
        </div>
        <div id="configPanel"></div>
        <button id="generateBtn" class="btn-primary">Generate toolpath</button>
      </section>
      <section>
        <h2>G-Code</h2>
        <div class="form-group">
          <label>Output type</label>
          <select id="outputType">
            <option value="laser">Laser</option>
            <option value="mill">Mill</option>
          </select>
        </div>
        <div class="form-group">
          <label>Feed rate (mm/min)</label>
          <input type="number" id="feedRate" value="800" min="1">
        </div>
        <button id="gcodeBtn" class="btn-secondary">Generate G-Code</button>
        <div class="btn-row">
          <button id="copyBtn" class="btn-small">Copy</button>
          <button id="saveBtn" class="btn-small">Save .nc</button>
        </div>
      </section>
    </nav>
    <main id="content">
      <div id="viewport">
        <div class="preview-pane"><div id="threeViewport"></div></div>
        <div id="viewportInfo">Select a shape and operation, then Generate</div>
      </div>
      <div id="tabs">
        <button class="tab active" data-panel="code">Code</button>
        <button class="tab" data-panel="info">Info</button>
        <button class="tab" data-panel="gcode">G-Code</button>
      </div>
      <div id="results">
        <div id="codePanel" class="panel active">
          <pre id="codeContent"></pre>
        </div>
        <div id="infoPanel" class="panel">
          <pre id="infoContent">No toolpath generated yet</pre>
        </div>
        <div id="gcodePanel" class="panel">
          <pre id="gcodeContent"></pre>
        </div>
      </div>
    </main>
  </div>
</div>
<!-- Resize Modal -->
<div id="resizeModal" class="modal-overlay" style="display:none">
  <div class="modal-dialog">
    <div class="modal-content">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:14px;color:#111827;">Resize Mesh</h3>
      <div class="form-group">
        <label>Width (X)</label>
        <input type="number" id="resizeW" step="0.001" class="form-oz">
      </div>
      <div class="form-group">
        <label>Length (Y)</label>
        <input type="number" id="resizeL" step="0.001" class="form-oz">
      </div>
      <div class="form-group">
        <label>Height (Z)</label>
        <input type="number" id="resizeH" step="0.001" class="form-oz">
      </div>
      <div style="margin:10px 0">
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#4a5565;cursor:pointer">
          <input type="checkbox" id="resizeLinked" checked> Link dimensions
        </label>
      </div>
      <div class="btn-row" style="justify-content:flex-end">
        <button id="resizeCancel" class="btn-small" style="flex:none;padding:8px 18px">Cancel</button>
        <button id="resizeApply" class="btn-primary" style="flex:none;padding:8px 18px;margin-bottom:0">Apply</button>
      </div>
    </div>
  </div>
</div>
<script type="module" src="demo.js"></script>
</body>
</html>
